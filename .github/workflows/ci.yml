name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mlops-task .

      - name: Run container and capture output
        run: |
          docker run --rm mlops-task > full_output.txt 2>&1
          cat full_output.txt
          grep "^{" full_output.txt | tail -1 > output.json
          cat output.json

      - name: Validate metrics output
        run: python3 validate.py